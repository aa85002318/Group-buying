<!DOCTYPE html>
<!-- 此檔為 Email 模板，請貼到 Supabase Dashboard → Authentication → Email Templates → Confirm signup -->
<!-- 請勿貼到 SQL Editor -->
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <title>驗證您的 chimeidiy 團購帳號</title>
</head>
<body style="margin:0;padding:0;background:#F5F0EB;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC',sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#F5F0EB;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(107,68,35,0.08);">
          <tr>
            <td style="background:#6B4423;padding:28px 32px;text-align:center;">
              <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;">chimeidiy 團購</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;color:#333333;line-height:1.7;font-size:15px;">
              <h1 style="margin:0 0 12px;font-size:20px;color:#6B4423;">歡迎加入</h1>
              <p style="margin:0 0 8px;color:#666666;font-size:14px;">您好，</p>
              <p style="margin:0 0 24px;color:#666666;font-size:14px;">感謝您註冊 <strong>chimeidiy 團購</strong>。請點擊下方按鈕完成 Email 驗證，驗證成功後即可登入購物與下單。</p>
              <p style="text-align:center;margin:32px 0;">
                <a href="{{ .ConfirmationURL }}"
                   style="display:inline-block;background:#E85D4C;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:999px;font-weight:600;font-size:15px;">
                  驗證 Email
                </a>
              </p>
              <p style="font-size:13px;color:#888888;">若按鈕無法點擊，請複製以下連結至瀏覽器：</p>
              <p style="font-size:12px;word-break:break-all;color:#aaaaaa;">{{ .ConfirmationURL }}</p>
              <p style="margin:24px 0 0;font-size:13px;color:#888888;text-align:center;">
                驗證有問題？請聯絡
                <a href="https://lin.ee/t7OFBO9" style="color:#06C755;text-decoration:none;font-weight:600;">chimeidiy團購客服</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px 28px;border-top:1px solid #EEE5DC;text-align:center;">
              <p style="margin:0 0 8px;font-size:12px;color:#888888;">如有問題請聯絡客服</p>
              <p style="margin:0;">
                <a href="https://lin.ee/t7OFBO9"
                   style="display:inline-block;background:#06C755;color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;">
                  chimeidiy團購客服
                </a>
              </p>
              <p style="margin:12px 0 0;font-size:12px;color:#aaaaaa;">chimeidiy 團購團隊</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
